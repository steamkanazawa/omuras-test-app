<!DOCTYPE html>
<html>
<head>
  <title>クイズ</title>

  <style>
    body {
      text-align: center;
      background: lightblue;
      font-family: sans-serif;
    }

    button {
      padding: 1px 2px;
      margin: 30px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      background: orange;
      color: white;
    }

    #result {
      font-size: 30px;
      margin-top: 20px;
    }
  </style>

</head>
<body>

  <h1>クイズ</h1>

  <p>Q. 日本の首都は？</p>

  <button onclick="wrong()">大阪</button>
  <button onclick="correct()">東京</button>
  <button onclick="wrong()">福岡</button>

  <p id="result"></p>

  <script>
    function correct() {
      document.getElementById("result").innerText = "正解！";
    }

    function wrong() {
      document.getElementById("result").innerText = "不正解！";
    }
  </script>

</body>
</html>
