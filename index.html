<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>1問クイズ</title>
  <style>
    /* CSS：見た目を整える（色と形） */
    body {
      text-align: center;
      font-family: sans-serif;
      padding-top: 50px;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      cursor: pointer;
    }

    .success {
      color: red;
      font-size: 30px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>クイズ：第1問</h1>
  <p>Webページの「見た目」をデザインする言語はどっち？</p>

  <button onclick="maru()">CSS</button>
  <button onclick="batsu()">HTML</button>

  <div id="kekka"></div>

  <script>
    /* JavaScript：ボタンを押した時の動き */
    function maru() {
      document.getElementById("kekka").innerHTML = "<p class='success'>正解！おめでとう！</p>";
    }

    function batsu() {
      alert("ざんねん！HTMLは骨組みだよ。");
    }
  </script>

</body>

</html>
